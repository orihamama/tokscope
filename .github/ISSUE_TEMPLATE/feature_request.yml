name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What problem are you trying to solve? Concrete example helps.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? CLI flag? MCP tool? Dashboard view?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, other tools that do this
  - type: dropdown
    id: surface
    attributes:
      label: Target surface
      options:
        - MCP server
        - CLI
        - Web dashboard
        - All / unsure
    validations:
      required: true
